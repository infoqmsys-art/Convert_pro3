{# 상단 헤더, 모바일 메뉴 백드롭, 탭 네비 — index.html 에서 include #}
<header>
    <div class="header-left">
        <button type="button" class="btn-mobile-menu" id="btn-mobile-menu" aria-expanded="false" aria-controls="main-app-nav" title="대시보드·관리·바로가기 메뉴">메뉴</button>
        <div class="app-logo">QM</div>
        <div class="header-titles">
            <h1>QM 통합관제 시스템</h1>
            <div class="meta" id="last-updated">마지막 갱신: -</div>
        </div>
        <span id="web-version-badge" style="font-size:11px;color:var(--text-placeholder);margin-left:8px;font-family:'Consolas',monospace;line-height:1;margin-top:2px"></span>
    </div>
    <div class="header-right">
        <span class="refresh-label">자동 갱신</span>
        <select class="refresh-select" id="refresh-interval">
            <option value="60">1분</option>
            <option value="300" selected>5분</option>
            <option value="600">10분</option>
            <option value="1800">30분</option>
            <option value="0">끄기</option>
        </select>
        <button class="btn-refresh" onclick="refreshAll()">새로고침</button>
        <a href="/logout" style="font-size:12px;color:var(--text-muted);text-decoration:none;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);transition:background .15s" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background=''">로그아웃</a>
    </div>
</header>
<div class="mobile-menu-backdrop" id="mobile-menu-backdrop" aria-hidden="true"></div>
<nav class="app-nav" id="main-app-nav">
    <button class="nav-item" onclick="switchPage('dashboard')" data-page="dashboard">메인화면</button>
    <button class="nav-item" onclick="switchPage('manager')" data-page="manager">담당자 설정</button>
    <button class="nav-item active" onclick="switchPage('report')" data-page="report">전체 현황리포트</button>
    <button class="nav-item" onclick="switchPage('qmremote')" data-page="qmremote">큐엠 원격모니터링</button>
    <button class="nav-item" onclick="switchPage('shortcuts')" data-page="shortcuts">프로그램 하이퍼링크</button>
</nav>
