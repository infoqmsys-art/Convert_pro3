/* ─── 전역 fetch 래퍼: 401 수신 시 자동 로그인 리다이렉트 ─── */
(function(){
  const _origFetch = window.fetch.bind(window);
  window.fetch = async function(...args){
    const res = await _origFetch(...args);
    if(res.status === 401){
      try {
        const ct = res.headers.get("content-type") || "";
        if(ct.includes("json")){
          const j = await res.clone().json();
          if(j.auth_required){ window.location.href = "/login"; return res; }
        }
      } catch(e){}
      window.location.href = "/login";
    }
    return res;
  };
})();

function cpDefaultPage() {

function cpReadSavedPage() {
  try {
    var h = (location.hash || "").replace(/^#/, "").split("&")[0].trim();
    try {
      h = decodeURIComponent(h);
    } catch (_e2) {}
    if (CP_VALID_PAGES.indexOf(h) >= 0) return h;
    var s = sessionStorage.getItem(CP_K_NAV);
    if (s && CP_VALID_PAGES.indexOf(s) >= 0) return s;
  } catch (_e) {}
  return cpDefaultPage();
}

function cpPersistNav(page) {
  try {
    sessionStorage.setItem(CP_K_NAV, page);
    var want = "#" + page;
    if (location.hash !== want) history.replaceState(null, "", want);
  } catch (_e) {}
}

function cpLoadScrollBag() {
  try {
    return JSON.parse(sessionStorage.getItem(CP_K_SCROLL) || "{}");
  } catch (_e) {
    return {};
  }
}

function cpSaveScrollBag(bag) {
  try {
    sessionStorage.setItem(CP_K_SCROLL, JSON.stringify(bag));

function cpScrollSelectors() {
  return [
    ".dash-company-list",

function cpCollectScrollSnapshot() {
  var out = [];
  out.push({ w: true, t: Math.round(window.scrollY || 0), l: Math.round(window.scrollX || 0) });
  var root = document.querySelector(".page.active");
  if (!root) return out;
  cpScrollSelectors().forEach(function (sel) {
    var nl = root.querySelectorAll(sel);
    for (var i = 0; i < nl.length; i++) {
      var el = nl[i];
      if (!el.scrollTop && !el.scrollLeft) continue;
      out.push({ sel: sel, nth: i, t: Math.round(el.scrollTop), l: Math.round(el.scrollLeft) });
    }
  });
  return out;
}

function cpSaveScrollForCurrentPage() {
  try {
    var bag = cpLoadScrollBag();
    bag[_currentPage] = cpCollectScrollSnapshot();
    cpSaveScrollBag(bag);
  } catch (_e) {}
}

function cpRestoreScrollForPage(pg) {
  try {
    var rows = cpLoadScrollBag()[pg];
    if (!rows || !rows.length) return;
    var rootId = CP_PAGE_IDS[pg];
    if (!rootId) return;
    var root = document.getElementById(rootId);
    if (!root) return;
    rows.forEach(function (obj) {
      if (obj.w) {
        window.scrollTo(obj.l || 0, obj.t || 0);
        return;
      }
      if (!obj || !obj.sel) return;
      var nl = root.querySelectorAll(obj.sel);
      if (!nl || nl.length <= obj.nth) return;
      var el = nl[obj.nth];
      el.scrollTop = obj.t || 0;
      el.scrollLeft = obj.l || 0;
    });
  } catch (_e) {}
}

var _cpScheduleScrollPersist = null;
function cpScheduleScrollPersist() {
  clearTimeout(_cpScheduleScrollPersist);
  _cpScheduleScrollPersist = setTimeout(function () {

}

function cpSetupScrollPersistence() {
  document.addEventListener("scroll", cpScheduleScrollPersist, true);
  window.addEventListener("beforeunload", function () {

  });
}

function cpRestoreDeferred() {
  cpRestoreScrollForPage(_currentPage);

}

function showNameEditModal(opts) {
  const { title, label, initialValue, onSave } = opts;
  document.getElementById("name-edit-overlay")?.remove();
  const overlay = document.createElement("div");
  overlay.id = "name-edit-overlay";
  overlay.className = "assign-overlay";
  const modal = document.createElement("div");
  modal.className = "assign-modal";
  modal.style.width = "min(420px,92vw)";
  modal.innerHTML = `
    <div class="assign-modal-header">
      <div class="assign-modal-title">${escHtml(title)}</div>
    </div>
    <div class="assign-modal-body">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px">${escHtml(label)}</label>
      <input type="text" id="name-edit-input" class="edit-input" style="width:100%;box-sizing:border-box;padding:10px 12px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm)">
    </div>
    <div class="assign-modal-footer">
      <button type="button" class="btn-secondary" id="name-edit-cancel">취소</button>
      <button type="button" class="btn-primary" id="name-edit-ok">저장</button>
    </div>`;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  const inp = modal.querySelector("#name-edit-input");
  inp.value = initialValue ?? "";
  inp.focus();
  inp.select();
  const close = () => overlay.remove();
  const save = () => {
    const v = (inp.value || "").trim();
    if (!v) { showToast("이름을 입력하세요"); return; }
    Promise.resolve(onSave(v)).then((r) => { if (r !== false) close(); }).catch(() => {});
  };
  modal.querySelector("#name-edit-cancel").onclick = close;
  modal.querySelector("#name-edit-ok").onclick = save;
  inp.onkeydown = (e) => {
    if (e.key === "Enter") { e.preventDefault(); save(); }
    if (e.key === "Escape") close();
  };
  /* 백드롭: 눌렀다 뗀 지점이 모두 오버레이일 때만 닫기 (입력란에서 드래그하다 밖에서 mouseup 해도 유지) */
  let downOnBackdrop = false;
  overlay.addEventListener("mousedown", (e) => { downOnBackdrop = e.target === overlay; });
  overlay.addEventListener("mouseup", (e) => {
    if (downOnBackdrop && e.target === overlay) close();
    downOnBackdrop = false;
  });
}

async function _postJson(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  let d = {};
  try {
    d = text ? JSON.parse(text) : {};
  } catch (e) {
    throw new Error("서버 응답을 JSON으로 읽을 수 없습니다");
  }
  if (!d.ok) throw new Error(d.error || "요청 실패");
  return d;
}

function setupDashboardLiveUpdates() {
  if (typeof EventSource === "undefined") return;
  if (_dashEventSource) {
    try {
      _dashEventSource.close();
    } catch (_e) {}
    _dashEventSource = null;
  }
  try {
    const es = new EventSource("/api/dashboard-events");
    _dashEventSource = es;
    es.onmessage = function (ev) {
      let d = {};
      try {
        d = JSON.parse(ev.data || "{}");
      } catch (_e) {}
      if (!d.ok) return;
      dashboardLiveApply(d.reason);
    };
  } catch (_e) {}
}

function dashboardLiveApply(reason) {
  const r = String(reason || "");
  if (r === "connected") return;
  if (r !== "qm_remote" && r !== "qm_remote_config") return;
  if (_currentPage === "qmremote") {
    if (r === "qm_remote_config" && document.getElementById("qm-remote-view-settings")?.classList.contains("is-active")) {
      qmRemoteLoadConfigForm();
      return;
    }
    qmRemoteRefresh();
    if (document.getElementById("qm-remote-view-list")?.classList.contains("is-active")) _qmRemoteStartAutoRefresh();
  } else {
    document.querySelector('.nav-item[data-page="qmremote"]')?.classList.add("nav-live-pending");
  }
}

function switchPage(page) {
  if (page !== _currentPage) cpSaveScrollForCurrentPage();
  _currentPage = page;
  if (page !== "qmremote") _qmRemoteStopAutoRefresh();
  syncNavVisualOnly(page);
  cpPersistNav(page);

  if (page === "dashboard") {
    if (_treeData) renderDashboard(_treeData);
    _refreshDetailInfoIfIdle();
  } else if (page === "manager") {
    renderManagerPage();
  } else if (page === "report") {
    stLoadPage();
  } else if (page === "qmremote") {
    qmRemoteShowList();
  } else if (page === "shortcuts") {
    webShortcutsLoad();
  }
}

/** 웹: 헤더 없이 접속하면 서버가 모든 브라우저를 같은 PC로 본다. 브라우저마다 1개 ID를 만들어 두고 항상 보낸다. */
function qmEnsureWebClientPcId() {
  try {
    const cur = localStorage.getItem("qm_client_pc_id");
    if (cur != null && String(cur).trim()) return;
    let id =
      typeof crypto !== "undefined" && typeof crypto.randomUUID === "function"
        ? "web-" + crypto.randomUUID()
        : "web-" + Date.now() + "-" + Math.random().toString(36).slice(2, 12);
    if (id.length > 120) id = id.slice(0, 120);
    localStorage.setItem("qm_client_pc_id", id);
  } catch (_e) {
    /* localStorage 차단 등 */
  }
}

function qmRemoteHeadersBase() {
  qmEnsureWebClientPcId();
  const h = {};
  const pid = (localStorage.getItem("qm_client_pc_id") || "").trim().slice(0, 120);
  if (pid) h["X-QM-Client-PC-ID"] = pid;
  return h;
}

function qmRemoteFetch(url, options) {
  const o = options || {};
  const hdrs = new Headers(o.headers || {});
  const base = qmRemoteHeadersBase();
  Object.keys(base).forEach((k) => hdrs.set(k, base[k]));
  if (o.body && typeof o.body === "string" && !hdrs.has("Content-Type")) {
    hdrs.set("Content-Type", "application/json");
  }
  return fetch(url, { ...o, headers: hdrs });
}

/** 표시 이름: 서버 오류 시 설정 폼 입력 복구용 브라우저 백업 */

// QM 원격 전용 자동 새로고침 타이머
let _qmRemoteAutoTimer = null;
let _qmRemoteCountdownTimer = null;
const QM_REMOTE_AUTO_REFRESH_SEC = 15; // 자동 새로고침 주기 (초)

function _qmRemoteStartAutoRefresh() {
  _qmRemoteStopAutoRefresh();
  let remaining = QM_REMOTE_AUTO_REFRESH_SEC;

  const tick = () => {
    const meta = document.getElementById("qm-remote-meta");
    if (meta) {
      const t = meta.dataset.lastRefresh || "";
      meta.textContent = (t ? "마지막 갱신: " + t + " · " : "") + remaining + "초 후 자동 새로고침";
    }
    remaining--;
    if (remaining < 0) {
      qmRemoteRefresh();
      remaining = QM_REMOTE_AUTO_REFRESH_SEC;
    }
  };
  tick();
  _qmRemoteCountdownTimer = setInterval(tick, 1000);
}

function _qmRemoteStopAutoRefresh() {
  if (_qmRemoteAutoTimer) { clearInterval(_qmRemoteAutoTimer); _qmRemoteAutoTimer = null; }
  if (_qmRemoteCountdownTimer) { clearInterval(_qmRemoteCountdownTimer); _qmRemoteCountdownTimer = null; }
}

  qmRemoteRefresh();
  _qmRemoteStartAutoRefresh();
}

}

// 현재 접속자 식별자 (status API 응답의 my_user)
let _qmMyUser = "";

function qmRemoteRenderCards(payload) {
  const host = document.getElementById("qm-remote-cards-host");
  const meta = document.getElementById("qm-remote-meta");
  if (!host) return;
  // 내 사용자 정보 갱신
  if (payload.my_user != null) _qmMyUser = String(payload.my_user);
  const rows = payload.rows || [];
  if (!rows.length) {
    host.innerHTML =
      '<div class="empty-state">등록된 원격 방이 없습니다. 우측 상단 <strong>설정</strong>에서 메인서버(방) 이름을 추가한 뒤 「방 목록 저장」하세요.</div>';
  } else {
    host.innerHTML =
      '<div class="qm-card-grid">' +
      rows
        .map((r) => {
          const st = r.status_label || (r.status === "ON" ? "사용 중" : "사용 가능");
          const on = r.status === "ON" || st === "사용 중";
          const noteVal = r.note != null ? String(r.note) : "";
          const user = (r.user || "").trim();
          const isMySession = on && _qmMyUser && user === _qmMyUser;
          const lineOn =
            "🟢 사용 중" +
            (user ? " (" + escHtml(user) + (isMySession ? " — 나" : "") + ")" : "") +
            (r.elapsed ? " — " + escHtml(r.elapsed) : "");
          const lineOff = "⚪ 사용 가능";
          const startDisp = (r.start_display != null && r.start_display !== "") ? String(r.start_display) : "—";
          // 본인 세션: 비밀번호 없이 종료 / 타인 세션: 비밀번호 입력 후 종료
          const stopBtn = isMySession
            ? '<button type="button" class="btn-danger" onclick="qmRemoteSessionStopOwn(this)">사용 종료</button>'
            : '<button type="button" class="btn-danger" style="opacity:.75" onclick="qmRemoteSessionStopFromCard(this)">강제 종료</button>';
          return (
            '<article class="qm-card" data-srv="' +
            escAttr(r.server_name || "") +
            '">' +
            '<div class="qm-card-head"><span class="qm-card-title">' +
            escHtml(r.server_name || "") +
            "</span></div>" +
            '<div class="qm-card-status ' +
            (on ? "qm-card-on" : "qm-card-off") +
            '">' +
            (on ? lineOn : lineOff) +
            "</div>" +
            '<div class="qm-card-meta">시작: ' +
            escHtml(startDisp) +
            "</div>" +
            '<div class="qm-card-notebox">' +
            '<div class="qm-card-note-label">비고</div>' +
            '<div class="qm-card-note-row">' +
            '<input type="text" class="qm-note-in" value="' +
            escAttr(noteVal) +
            '">' +
            '<button type="button" class="btn-secondary" style="padding:6px 12px;font-size:12px;white-space:nowrap" onclick="qmRemoteSaveNote(this)">저장</button>' +
            "</div></div>" +
            '<div class="qm-card-actions">' +
            (on ? stopBtn : '<button type="button" class="btn-save" onclick="qmRemoteSessionStartFromCard(this)">사용 시작</button>') +
            "</div></article>"
          );
        })
        .join("") +
      "</div>";
  }
  if (meta) {
    let t = "마지막 새로고침: " + (payload.checked_at || "-");
    if (payload.fetch_error) t += " · 문제: " + payload.fetch_error;
    meta.textContent = t;
  }
}

function qmRemoteSessionStopOwn(btn) {

  });

async function qmRemoteSessionStart(serverName) {
  try {
    const res = await qmRemoteFetch("/api/qm-remote/session/start", {
      method: "POST",
      body: JSON.stringify({ server_name: serverName }),
    });
    const d = await res.json().catch(() => ({}));
    if (d.ok) {
      showToast(d.already ? "이미 이 PC(표시 이름)로 사용 중입니다" : "사용을 시작했습니다");
      qmRemoteRefresh();
      return;
    }
    if (res.status === 409) {
      showToast(d.error || "다른 사용자가 사용 중입니다");
      return;
    }
    alert(d.error || "시작하지 못했습니다");
  } catch (e) {
    showToast("네트워크 오류");
  }
}

async function qmRemoteSessionStop(serverName, adminPassword) {
  try {
    const body = { server_name: serverName, admin_password: adminPassword || "" };
    const res = await qmRemoteFetch("/api/qm-remote/session/stop", {
      method: "POST",
      body: JSON.stringify(body),
    });
    const d = await res.json().catch(() => ({}));
    if (d.ok) {
      showToast(d.already_off ? "이미 사용 가능 상태입니다" : "사용을 종료했습니다");
      qmRemoteRefresh();
      return;
    }
    // 비밀번호 오류 등 실패 시 알림만 표시 (재시도 없음)
    showToast(d.error || "종료하지 못했습니다");
  } catch (e) {
    showToast("네트워크 오류");
  }
}

function qmRemoteRefresh() {
  qmRemoteFetch("/api/qm-remote/status")
    .then((r) => r.json())
    .then((d) => {
      if (!d.ok) {
        const host = document.getElementById("qm-remote-cards-host");
        if (host) host.innerHTML = '<div class="empty-state">' + escHtml(d.error || "상태를 불러오지 못했습니다") + "</div>";
        const meta = document.getElementById("qm-remote-meta");
        if (meta) { meta.dataset.lastRefresh = ""; meta.textContent = d.error ? String(d.error) : ""; }
        if (d.error) showToast(d.error);
        return;
      }
      // 마지막 갱신 시각 기록 (카운트다운 표시용)
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0") + ":" + now.getSeconds().toString().padStart(2,"0");
      const meta = document.getElementById("qm-remote-meta");
      if (meta) meta.dataset.lastRefresh = timeStr;
      qmRemoteRenderCards(d);
    })
    .catch(() => showToast("네트워크 오류"));
}

function qmRemoteLoadConfigForm() {
  return qmRemoteFetch("/api/qm-remote/config")
    .then((r) => r.json())
    .then((d) => {
      if (!d.ok) return;
      const nameEl = document.getElementById("qm-my-pc-name");
      if (nameEl) {
        let v = d.my_pc_display_name != null ? String(d.my_pc_display_name) : "";
        if (!String(v).trim()) {
          try {
            const ls = localStorage.getItem(QM_LS_DISPLAY_NAME);
            if (ls != null && String(ls).trim()) v = String(ls).trim();
          } catch (_e) {}
        }
        nameEl.value = v;
      }
      const tb = document.getElementById("qm-server-rows");
      if (!tb) return;
      tb.innerHTML = "";
      const servers = d.servers || [];
      if (!servers.length) {
        qmRemoteAddServerRow(true);
        return;
      }
      servers.forEach((name) => qmRemoteAddServerRow(false, name));
    })
    .catch(() => {
      const nameEl = document.getElementById("qm-my-pc-name");
      try {
        if (nameEl) {
          const ls = localStorage.getItem(QM_LS_DISPLAY_NAME);
          if (ls != null) nameEl.value = String(ls);
        }
      } catch (_e) {}
    });
}

function qmRemoteAddServerRow(focusFirst, serverName) {
  const tb = document.getElementById("qm-server-rows");
  if (!tb) return;
  const tr = document.createElement("tr");
  const v = serverName != null && serverName !== undefined ? String(serverName) : "";
  tr.innerHTML =
    "<td><input type=\"text\" class=\"qm-in-server\" placeholder=\"예: 큐엠메인서버1\" value=\"" +
    escAttr(v) +
    "\"></td>" +
    "<td><button type=\"button\" class=\"btn-secondary\" style=\"padding:4px 10px;font-size:11px\">삭제</button></td>";
  const delBtn = tr.querySelector("button");
  if (delBtn)
    delBtn.onclick = () => {
      tr.remove();
      const left = document.getElementById("qm-server-rows")?.querySelectorAll("tr").length;
      if (!left) qmRemoteAddServerRow(true);
    };
  tb.appendChild(tr);
  if (focusFirst) tr.querySelector(".qm-in-server")?.focus();
}

function qmRemoteCollectServers() {

}

function webShortcutsAddRow(rec) {
  const tb = document.getElementById("web-sc-rows");
  if (!tb) return;
  const tr = document.createElement("tr");
  const id = rec && rec.id ? String(rec.id) : "";
  tr.dataset.linkId = id;
  const lid = rec && rec.login_id ? rec.login_id : "";
  const pw = rec && rec.password ? rec.password : "";
  tr.innerHTML =
    "<td><input type=\"text\" class=\"web-sc-in-name\" placeholder=\"예: 측정 포털\" value=\"" +
    escAttr(rec && rec.name ? rec.name : "") +
    "\"></td>" +
    "<td><input type=\"url\" class=\"web-sc-in-url\" placeholder=\"https://...\" value=\"" +
    escAttr(rec && rec.url ? rec.url : "") +
    "\"></td>" +
    "<td><input type=\"text\" class=\"web-sc-in-login\" placeholder=\"아이디\" value=\"" +
    escAttr(lid) +
    "\"></td>" +
    "<td><input type=\"password\" class=\"web-sc-in-pass\" placeholder=\"비밀번호\" value=\"" +
    escAttr(pw) +
    "\" autocomplete=\"new-password\"></td>" +
    "<td><button type=\"button\" class=\"btn-secondary\" style=\"padding:4px 10px;font-size:11px\">삭제</button></td>";
  const delBtn = tr.querySelector("button");
  if (delBtn)
    delBtn.onclick = () => {
      tr.remove();
      const left = document.getElementById("web-sc-rows")?.querySelectorAll("tr").length;
      if (!left) webShortcutsAddRow(null);
    };
  tb.appendChild(tr);
}

function webShortcutsLoad() {
  return fetch("/api/web-shortcuts")
    .then((r) => r.json())
    .then((d) => {
      if (!d.ok) return;
      const links = d.links || [];
      webShortcutsRenderListTable(links);
      const tb = document.getElementById("web-sc-rows");
      if (!tb) return;
      tb.innerHTML = "";
      if (!links.length) {
        webShortcutsAddRow(null);
        return;
      }
      links.forEach((x) => webShortcutsAddRow(x));
    })
    .catch(() => {});
}

function webShortcutsSave() {
  const tb = document.getElementById("web-sc-rows");
  if (!tb) return;
  const links = [];
  tb.querySelectorAll("tr").forEach((tr) => {
    const name = (tr.querySelector(".web-sc-in-name")?.value || "").trim();
    const url = (tr.querySelector(".web-sc-in-url")?.value || "").trim();
    if (!name || !url) return;
    const id = (tr.dataset.linkId || "").trim();
    const login_id = (tr.querySelector(".web-sc-in-login")?.value || "").trim();
    const password = (tr.querySelector(".web-sc-in-pass")?.value || "").trim();
    links.push({ id, name, url, login_id, password });
  });
  fetch("/api/web-shortcuts", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ links }),
  })
    .then((r) => r.json())
    .then((d) => {
      if (!d.ok) {
        alert(d.error || "저장 실패");
        return;
      }
      showToast("web_shortcuts.json 저장됨");
      webShortcutsRenderListTable(d.links || []);
      webShortcutsLoad();
    })
    .catch(() => alert("네트워크 오류"));
}

/* ═══════════════════════════════════
   Data aggregation
═══════════════════════════════════ */
function aggregateCompany(compNode) {
  let total=0,normal=0,delayed=0,unconverted=0,ghost=0,sites=0;
  (compNode.sites||[]).forEach(s => {
    sites++;
    (s.folders||[]).forEach(fo => (fo.files||[]).forEach(f => {
      total++;
      if(f.status==="정상")normal++;else if(f.status==="지연")delayed++;else if(f.status==="Ghost")ghost++;else unconverted++;
    }));
  });
  return {total,normal,delayed,unconverted,ghost,sites};
}

function aggregateSite(siteNode) {
  let total=0,normal=0,delayed=0,unconverted=0,ghost=0;
  (siteNode.folders||[]).forEach(fo => (fo.files||[]).forEach(f => {
    total++;
    if(f.status==="정상")normal++;else if(f.status==="지연")delayed++;else if(f.status==="Ghost")ghost++;else unconverted++;
  }));
  return {total,normal,delayed,unconverted,ghost};
}

/* ── 개소 구조 읽기 전용 HTML (대시보드 미리보기 전용) ── */
function _loggerCountByStationId(site) {
  const map = Object.create(null);
  (site.stations || []).forEach((s) => {
    if (s && s.id) map[s.id] = 0;
  });
  (site.folders || []).forEach((fo) => {
    (fo.files || []).forEach((f) => {
      const sid = f.station_id;
      if (sid && map[sid] !== undefined) map[sid]++;
    });
  });
  return map;
}

function buildCategoryReadonlyTreeHtml(site) {
  const groups = [...(site.station_groups || [])].sort((a, b) => (a.order || 0) - (b.order || 0));
  const stations = [...(site.stations || [])].sort((a, b) => (a.order || 0) - (b.order || 0));
  const cnt = _loggerCountByStationId(site);
  const groupIds = new Set(groups.map((g) => g.id).filter(Boolean));

  function rowStation(st) {
    const n = st && st.id != null && cnt[st.id] !== undefined ? cnt[st.id] : (st.logger_count != null ? st.logger_count : 0);
    const label = (st.name || st.id || "").trim() || "(이름 없음)";
    return `<div class="crt-station"><span class="crt-line"></span><span class="crt-name">${escHtml(label)}</span><span class="crt-badge" title="배정 로거 수">${n}</span></div>`;
  }

  if (!stations.length && !groups.length) {
    return '<div class="crt-empty">등록된 카테고리(대·소분류)가 없습니다.<span class="crt-hint">「카테고리」 탭에서 추가할 수 있습니다.</span></div>';
  }

  if (!groups.length) {
    return `<div class="crt-body">${stations.length ? stations.map(rowStation).join("") : '<div class="crt-empty" style="padding:12px;font-size:12px">소분류만 있고 항목이 없습니다.</div>'}</div>`;
  }

  let html = '<div class="crt-body">';
  for (const g of groups) {
    const gid = g.id;
    const subs = stations.filter((s) => s.group_id === gid);
    const subsShown = subs.length ? subs.map(rowStation).join("") : '<div class="crt-empty" style="padding:12px;font-size:12px">소분류 없음 (대분류만 추가됨)</div>';
    html += `<div class="crt-group">
      <div class="crt-group-head"><span class="crt-group-name">${escHtml((g.name || g.id || "").trim() || "(대분류)")}</span><span class="crt-badge-soft">${subs.length}</span></div>
      <div class="crt-group-kids">${subsShown}</div>
    </div>`;
  }
  const ungrouped = stations.filter((s) => !s.group_id || !groupIds.has(s.group_id));
  if (ungrouped.length) {
    html += `<div class="crt-group">
      <div class="crt-group-head crt-ungrouped"><span class="crt-group-name">미분류</span><span class="crt-badge-soft">${ungrouped.length}</span></div>
      <div class="crt-group-kids">${ungrouped.map(rowStation).join("")}</div>
    </div>`;
  }
  html += "</div>";
  return html;
}

function buildProgramSelectOptions(site) {

  let opts = `<option value="" ${!cur ? "selected" : ""}>선택 안 함</option>`;
  for (const p of list) {
    opts += `<option value="${escAttr(p)}" ${cur === p ? "selected" : ""}>${escHtml(p)}</option>`;
  }
  if (cur && !list.includes(cur)) {
    opts += `<option value="${escAttr(cur)}" selected>(목록에 없음) ${escHtml(cur)}</option>`;
  }
  return opts;
}

      site_address:address, site_program:program,
      check_interval:ci, report_enabled:re, report_cycle:rc, memo:mo

  })
  .then(r=>r.json())
  .then(d=>{

/* ═══════════════════════════════════
   Station panel
═══════════════════════════════════ */
let _stationState    = null;
let _stationOriginal = null;  // 취소 시 복원용 원본 스냅샷

/* ── 카드 헤더 액션바(저장/취소 버튼) 갱신 ── */
function _updateCatActionBar(ss) {
  if (!ss) return;
  const actionBar = document.getElementById("cat-action-bar-" + ss.sid);
  if (!actionBar) return;
  const dirty = !!ss.isDirty;
  actionBar.innerHTML =
    (dirty ? '<span class="cat-unsaved-hint">미저장 변경 있음</span>' : '') +
    `<button class="btn-secondary btn-cat" onclick="cancelStationChanges()"${dirty?'':' disabled'}>취소</button>` +
    `<button class="btn-primary btn-cat" onclick="saveAllStationChanges()"${dirty?'':' disabled'}>저장</button>`;
}

/* ── 변경 있음 표시 ── */
function markDirty(focusAfter) {
  if (_stationState) { _stationState.isDirty = true; drawStationPanel(focusAfter); }
}

/* ── 저장: 전체 카테고리 상태를 서버에 일괄 저장 ── */
function saveAllStationChanges() {
  if (!_stationState) return;
  const ss = _stationState;
  /* 저장 중 버튼 비활성화 */
  const actionBar = document.getElementById("cat-action-bar-" + ss.sid);
  if (actionBar) {
    actionBar.innerHTML =
      '<span class="cat-unsaved-hint">저장 중…</span>' +
      '<button class="btn-secondary btn-cat" disabled>취소</button>' +
      '<button class="btn-primary btn-cat" disabled>저장 중…</button>';
  }

  // loggers 배열 → assignments 딕셔너리
  const assignments = {};
  ss.loggers.forEach(l => { if (l.station_id) assignments[`${l.folder}/${l.filename}`] = l.station_id; });

  fetch("/api/station/save_all", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      company: ss.company, site: ss.site,
      station_groups: ss.station_groups,
      stations: ss.stations,
      assignments
    })
  })
  .then(async (r) => {
    const text = await r.text();
    let d;
    try {
      d = text ? JSON.parse(text) : {};
    } catch (e) {
      const hint = text.replace(/\s+/g, " ").trim().slice(0, 220);
      throw new Error(
        "저장 응답을 해석할 수 없습니다 (HTTP " + r.status + "). " +
        (hint ? hint : "본문이 비어 있거나 JSON이 아닙니다.")
      );
    }
    if (!d.ok) { alert(d.error || "저장 실패"); _updateCatActionBar(ss); return; }
    ss.isDirty = false;
    // 스냅샷 갱신 (다음 취소의 기준점)
    _stationOriginal = {
      station_groups: JSON.parse(JSON.stringify(ss.station_groups)),
      stations:       JSON.parse(JSON.stringify(ss.stations)),
      loggers:        JSON.parse(JSON.stringify(ss.loggers)),
    };
    const rootTree = _treeData && (_treeData.tree || null);
    if (Array.isArray(rootTree)) {
      for (const comp of rootTree) {
        if (comp.company !== ss.company) continue;
        for (const s of (comp.sites || [])) {
          if (s.site === ss.site) {
            s.station_groups = JSON.parse(JSON.stringify(ss.station_groups));
            s.stations = ss.stations.map(st => ({...st}));
            break;
          }
        }
      }
    }
    if (_detailSite && _detailSite.company === ss.company && _detailSite.site === ss.site) {
      _detailSite.station_groups = JSON.parse(JSON.stringify(ss.station_groups));
      _detailSite.stations = ss.stations.map(st => ({...st}));
      if (_detailActiveTab === "info") {
        renderDetailPanelInfo(_detailSite);
      }
    }
    drawStationPanel();
    _updateCatActionBar(ss);  // drawStationPanel 후 한 번 더 명시 갱신
    showToast("카테고리가 저장되었습니다");
  })
  .catch((err) => {
    let msg = (err && err.message) ? err.message : String(err);
    if (err && err.name === "TypeError" && (/Failed to fetch/i.test(msg) || /Load failed/i.test(msg) || /NetworkError/i.test(msg))) {
      msg = "서버에 연결하지 못했습니다. " + window.location.origin +
        " 에서 API(POST /api/station/save_all)까지 도달하는지 확인하세요. " +
        "원격 IP(예: 14.xx)로 접속 중이면 해당 PC 방화벽·공유기에서 포트 " +
        (window.location.port || "80/443") + " 포워딩/허용 여부를 확인하세요.";
    }
    alert(msg);
    _updateCatActionBar(ss);
  });
}

/* ── 취소: 원본 스냅샷으로 복원 ── */
function cancelStationChanges() {
  if (!_stationState || !_stationOriginal) return;
  const orig = _stationOriginal;
  const ss = _stationState;
  ss.station_groups   = JSON.parse(JSON.stringify(orig.station_groups));
  ss.stations         = JSON.parse(JSON.stringify(orig.stations));
  ss.loggers          = JSON.parse(JSON.stringify(orig.loggers));
  ss.isDirty          = false;
  ss.selGrpId         = orig.station_groups[0]?.id || null;
  ss.selStId          = null;
  ss.selRegLogKey     = null;
  ss.selUnregLogKeys  = [];
  ss.unregSearch      = "";
  const subs = stationsInGroup();
  if (subs.length) ss.selStId = subs[0].id;
  drawStationPanel();
  _updateCatActionBar(ss);  // 명시 갱신
  showToast("변경사항이 취소되었습니다");
}

function renderStationPanel(site, sid) {
  const panel = document.getElementById("station-panel-"+sid);
  if (!panel) return;

  fetch(`/api/site/loggers?company=${encodeURIComponent(site.company)}&site=${encodeURIComponent(site.site)}`)
    .then(r=>r.json())
    .then(d=>{
      _stationState = {
        company: site.company,
        site: site.site,
        sid: sid,
        station_groups: site.station_groups||[],
        stations: site.stations||[],
        loggers: d.loggers||[],
        selGrpId: null,
        selStId: null,
        selRegLogKey: null,
        selUnregLogKeys: [],
        unregSearch: "",
        isDirty: false,
      };
      // 취소용 원본 스냅샷 저장
      _stationOriginal = {
        station_groups: JSON.parse(JSON.stringify(_stationState.station_groups)),
        stations:       JSON.parse(JSON.stringify(_stationState.stations)),
        loggers:        JSON.parse(JSON.stringify(_stationState.loggers)),
      };
      if (_stationState.station_groups.length) {
        _stationState.selGrpId = _stationState.station_groups[0]?.id || null;
      }
      const subs = stationsInGroup();
      if (subs.length) _stationState.selStId = subs[0].id;
      drawStationPanel();
    })
    .catch(()=>{ panel.innerHTML = '<div class="empty-state">개소 데이터를 불러올 수 없습니다</div>'; });
}

/* stationsInGroup: 소분류 열에 표시될 목록 (현재 선택 컨텍스트 기준) */
function stationsInGroup() {
  if (!_stationState) return [];
  const ss = _stationState;
  const hasGroups = ss.station_groups.length > 0;
  if (!hasGroups) return ss.stations.sort((a,b)=>(a.order||0)-(b.order||0));
  if (!ss.selGrpId) return [];
  return ss.stations.filter(s=>s.group_id===ss.selGrpId).sort((a,b)=>(a.order||0)-(b.order||0));
}

  const grpColHtml = `

          <button class="cat-primary-btn" onclick="addGroup()">추가</button>
          <button class="cat-action-btn" onclick="renameGroup()">${SVG_EDIT} 이름 변경</button>
          <button class="cat-action-btn danger" onclick="deleteGroup()">${SVG_DEL} 삭제</button>
        </div>
      </div>
      <div class="cat-list">${grpItems||'<div class="cat-empty">대분류 없음<br><span style="font-size:11px">추가 버튼으로 만들어보세요</span></div>'}</div>
    </div>`;

  /* ── 열2: 소분류 ── */
  const subs = stationsInGroup();
  const canAddSub = !hasGroups || !!ss.selGrpId;
  const subItems = subs.map(s => {
    const cnt = ss.loggers.filter(l=>l.station_id===s.id).length;
    const sel = ss.selStId===s.id;
    return `<div class="cat-item${sel?' selected':''}" onclick="stStSelect('${escAttr(s.id)}')">
      <span class="cat-item-name">${escHtml(s.name)}</span>
      <span class="cat-item-count">${cnt}</span>
    </div>`;
  }).join('');

  const subEmpty = !hasGroups
    ? '<div class="cat-empty">소분류 없음<br><span style="font-size:11px">추가 버튼으로 만들어보세요</span></div>'
    : !ss.selGrpId
      ? '<div class="cat-empty">대분류를<br>선택하세요</div>'
      : '<div class="cat-empty">이 대분류에 소분류가 없습니다<br><span style="font-size:11px">추가 버튼으로 만들어보세요</span></div>';

  const subColHtml = `
    <div class="cat-col">
      <div class="cat-col-head">
        <span class="cat-col-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          소분류
        </span>
        <span class="cat-col-badge">${subs.length}</span>
      </div>
      <div class="cat-controls">
        <div class="cat-inp-row">
          <input id="sub-add-inp" placeholder="소분류명" ${canAddSub?'':'disabled'} onkeydown="if(event.key==='Enter'){event.preventDefault();addStationToGroup();}">
          <button class="cat-action-btn" onclick="moveStation(-1)" title="위로">${SVG_UP}</button>
          <button class="cat-action-btn" onclick="moveStation(1)" title="아래로">${SVG_DN}</button>
        </div>
        <div class="cat-btn-row">
          <button class="cat-primary-btn" onclick="addStationToGroup()" ${canAddSub?'':'disabled'}>추가</button>
          <button class="cat-action-btn" onclick="renameStation()">${SVG_EDIT} 이름 변경</button>
          <button class="cat-action-btn danger" onclick="deleteStation()">${SVG_DEL} 삭제</button>
        </div>
      </div>
      <div class="cat-list">${subItems||subEmpty}</div>
    </div>`;

  /* ── 열3: 등록된 로거 (선택된 소분류에 배정된 로거) ── */
  const regLoggers = ss.selStId ? ss.loggers.filter(l=>l.station_id===ss.selStId) : [];
  const regItems = regLoggers.map(l => {
    const key = l.folder+'|'+l.filename;
    const sel = ss.selRegLogKey===key;
    return `<div class="cat-log-item${sel?' selected':''}" onclick="selectRegLog('${escAttr(key)}')">
      <span class="cat-log-name">${escHtml(l.filename)}</span>
      <span class="cat-log-folder">${escHtml(l.folder)}</span>
    </div>`;
  }).join('');

  const regColHtml = `
    <div class="cat-col">
      <div class="cat-col-head">
        <span class="cat-col-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          등록된 로거
        </span>
        <span class="cat-col-badge">${regLoggers.length}</span>
      </div>
      <div class="cat-controls">
        <button class="cat-unreg-btn" onclick="unregisterLogger()" ${ss.selRegLogKey?'':'disabled'}>등록해제</button>
      </div>
      <div class="cat-list">${ss.selStId
        ? (regItems||'<div class="cat-empty">등록된 로거 없음<br><span style="font-size:11px">미등록 로거에서 등록하세요</span></div>')
        : '<div class="cat-empty">소분류를<br>선택하세요</div>'
      }</div>
    </div>`;

  /* ── 열4: 미등록 로거 (station_id 없는 로거 전체) ── */
  const unregAll = ss.loggers.filter(l=>!l.station_id);
  const unregQ = (ss.unregSearch || "").trim().toLowerCase();
  const unregLoggers = unregQ
    ? unregAll.filter(l =>
        (l.filename || "").toLowerCase().includes(unregQ) ||
        (l.folder || "").toLowerCase().includes(unregQ))
    : unregAll;
  const unregItems = unregLoggers.map(l => {
    const key = l.folder+'|'+l.filename;
    const sel = (ss.selUnregLogKeys||[]).includes(key);
    return `<div class="cat-log-item${sel?' selected':''}" onclick="selectUnregLog('${escAttr(key)}',event)">
      <span class="cat-log-name">${escHtml(l.filename)}</span>
      <span class="cat-log-folder">${escHtml(l.folder)}</span>
    </div>`;
  }).join('');

  const canReg = !!(ss.selStId && (ss.selUnregLogKeys||[]).length);
  const unregHint =
    unregQ && unregLoggers.length !== unregAll.length
      ? `<div class="cat-unreg-hint">전체 <strong>${unregAll.length}</strong>건 중 <strong>${unregLoggers.length}</strong>건 표시</div>`
      : unregQ && unregLoggers.length === 0
        ? `<div class="cat-unreg-hint">검색과 일치하는 항목이 없습니다.</div>`
        : "";
  const unregListInner = unregItems
    || (unregQ
      ? '<div class="cat-empty">검색 결과 없음</div>'
      : '<div class="cat-empty">미등록 로거 없음</div>');
  const unregColHtml = `
    <div class="cat-col">
      <div class="cat-col-head">
        <span class="cat-col-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          미등록 로거
        </span>
        <span class="cat-col-badge">${unregAll.length}</span>
      </div>
      <div class="cat-controls">
        <input type="search" id="unreg-search-inp" class="cat-unreg-search" placeholder="파일명·폴더 검색…" autocomplete="off" value="${escAttr(ss.unregSearch || "")}" oninput="onUnregSearchInput()">
        ${unregHint}
        <button class="cat-reg-btn" onclick="registerLogger()" ${canReg?'':'disabled'}>등록${(ss.selUnregLogKeys||[]).length>1 ? ` (${(ss.selUnregLogKeys||[]).length}개)` : ''}</button>
        <div style="font-size:10px;color:var(--text-placeholder);margin-top:4px;text-align:center">Ctrl 또는 ⌘ + 클릭으로 여러 개 선택</div>
      </div>
      <div class="cat-list">${unregListInner}</div>
    </div>`;

  panel.innerHTML = `<div class="cat-layout">${grpColHtml}${subColHtml}${regColHtml}${unregColHtml}</div>`;

  /* 헤더 오른쪽 저장/취소 버튼 업데이트 (panel 교체 후 실행) */
  _updateCatActionBar(ss);

  if (focusAfter === "grp-add" || focusAfter === "sub-add") {
    const id = focusAfter === "grp-add" ? "grp-add-inp" : "sub-add-inp";
    requestAnimationFrame(() => {
      const el = document.getElementById(id);
      if (el && !el.disabled) {
        el.value = "";
        el.focus();
      }
    });
  }
  if (focusAfter === "unreg-search") {
    requestAnimationFrame(() => {
      const el = document.getElementById("unreg-search-inp");
      if (el) {
        const v = _stationState.unregSearch || "";
        el.value = v;
        el.focus();
        try {
          el.setSelectionRange(v.length, v.length);
        } catch (e) {}
      }
    });
  }
}

/* addGroupFromStation 제거 - 대분류 열에 직접 추가 버튼 있음 */

function stGrpSelect(gid) {
  if (!_stationState) return;
  _stationState.selGrpId = gid;
  _stationState.selStId = null;
  _stationState.selRegLogKey = null;
  const subs = stationsInGroup();
  if (subs.length) _stationState.selStId = subs[0].id;
  drawStationPanel();
}
function stStSelect(stId) {
  if (!_stationState) return;
  _stationState.selStId = stId;
  _stationState.selRegLogKey = null;
  drawStationPanel();
}

function addGroup() {
  if (!_stationState) return;
  const name = (document.getElementById("grp-add-inp")?.value||"").trim();
  if (!name) return;
  const ss = _stationState;
  const new_id = "grp_" + Date.now();
  const order = ss.station_groups.length ? Math.max(...ss.station_groups.map(g=>g.order||0)) + 1 : 0;
  const rec = { id: new_id, name, order };
  ss.station_groups.push(rec);
  ss.selGrpId = new_id;
  markDirty("grp-add");
}

function deleteGroup() {
  if (!_stationState || !_stationState.selGrpId || _stationState.selGrpId==="__ungrouped__") return;
  if (!confirm("대분류를 삭제하시겠습니까? 소속 소분류는 미분류가 됩니다.")) return;
  const ss = _stationState;
  ss.stations.forEach(s=>{ if(s.group_id===ss.selGrpId) s.group_id=""; });
  ss.station_groups = ss.station_groups.filter(g=>g.id!==ss.selGrpId);
  ss.selGrpId = ss.station_groups[0]?.id||null;
  ss.selStId = null;
  markDirty();
}

function renameGroup() {
  if (!_stationState) return;
  if (!_stationState.selGrpId) { showToast("대분류를 목록에서 먼저 선택하세요"); return; }
  const g = _stationState.station_groups.find(x=>x.id===_stationState.selGrpId);
  if (!g) { showToast("대분류를 목록에서 먼저 선택하세요"); return; }
  showNameEditModal({
    title: "대분류 이름 변경",
    label: "이름",
    initialValue: g.name || "",
    onSave: (name) => { g.name = name; markDirty(); showToast("이름 변경됨 (미저장)"); }
  });
}

function addStationToGroup() {
  if (!_stationState) return;
  const name = (document.getElementById("sub-add-inp")?.value||"").trim();
  if (!name) return;
  const ss = _stationState;
  const group_id = (ss.station_groups.length && ss.selGrpId) ? ss.selGrpId : "";
  const new_id = "st_" + Date.now();
  const order = ss.stations.length ? Math.max(...ss.stations.map(s=>s.order||0)) + 1 : 0;
  const rec = { id: new_id, name, order, group_id, logger_count: 0 };
  ss.stations.push(rec);
  ss.selStId = new_id;
  markDirty("sub-add");
}

/* ── 대분류 순서 이동 ── */
function moveGroup(dir) {
  if (!_stationState || !_stationState.selGrpId) return;
  const ss = _stationState;
  const list = ss.station_groups.slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const idx = list.findIndex(g=>g.id===ss.selGrpId);
  const ni = idx + dir;
  if (ni < 0 || ni >= list.length) return;
  [list[idx], list[ni]] = [list[ni], list[idx]];
  list.forEach((g,i) => { g.order = i; });
  ss.station_groups = list;
  markDirty();
}

/* ── 등록된 로거 선택 ── */
function selectRegLog(key) {
  if (!_stationState) return;
  _stationState.selRegLogKey = (_stationState.selRegLogKey === key) ? null : key;
  drawStationPanel();
}

function onUnregSearchInput() {
  if (!_stationState) return;
  const el = document.getElementById("unreg-search-inp");
  _stationState.unregSearch = el ? el.value : "";
  drawStationPanel("unreg-search");
}

/* ── 미등록 로거 선택 ── */
function selectUnregLog(key, evt) {
  if (!_stationState) return;
  if (!Array.isArray(_stationState.selUnregLogKeys)) _stationState.selUnregLogKeys = [];
  const multi = evt && (evt.ctrlKey || evt.metaKey);
  if (multi) {
    const i = _stationState.selUnregLogKeys.indexOf(key);
    if (i >= 0) _stationState.selUnregLogKeys.splice(i, 1);
    else _stationState.selUnregLogKeys.push(key);
  } else {
    if (_stationState.selUnregLogKeys.length === 1 && _stationState.selUnregLogKeys[0] === key) {
      _stationState.selUnregLogKeys = [];
    } else {
      _stationState.selUnregLogKeys = [key];
    }
  }
  drawStationPanel();
}

function _parseLogKey(k) {
  const i = k.indexOf('|');
  if (i < 0) return { folder: '', filename: '' };
  return { folder: k.slice(0, i), filename: k.slice(i + 1) };
}

/* ── 등록: 미등록 로거(복수 가능) → 선택된 소분류 로컬 배정 ── */
function registerLogger() {
  if (!_stationState || !_stationState.selStId) return;
  const keys = _stationState.selUnregLogKeys || [];
  if (!keys.length) return;
  const ss = _stationState;
  for (const k of keys) {
    const { folder, filename } = _parseLogKey(k);
    const l = ss.loggers.find(x => x.folder === folder && x.filename === filename);
    if (l) l.station_id = ss.selStId;
  }
  ss.selUnregLogKeys = [];
  markDirty();
  showToast(keys.length > 1 ? `${keys.length}개 배정됨 (미저장)` : "배정됨 (미저장)");
}

/* ── 등록해제: 등록된 로거 → 미배정 (로컬) ── */
function unregisterLogger() {
  if (!_stationState || !_stationState.selRegLogKey) return;
  const ss = _stationState;
  const [folder, filename] = ss.selRegLogKey.split('|');
  const l = ss.loggers.find(x=>x.folder===folder&&x.filename===filename);
  if (l) l.station_id = "";
  ss.selRegLogKey = null;
  markDirty();
  showToast("배정 해제됨 (미저장)");
}

function deleteStation() {
  if (!_stationState || !_stationState.selStId) { alert("항목을 선택하세요"); return; }
  const ss = _stationState;
  const st = ss.stations.find(s=>s.id===ss.selStId);
  if (!confirm(`"${st?.name||'소분류'}"를 삭제하시겠습니까?`)) return;
  ss.loggers.forEach(l=>{ if(l.station_id===ss.selStId) l.station_id=""; });
  const wasGrp = st?.group_id||"";
  ss.stations = ss.stations.filter(s=>s.id!==ss.selStId);
  const siblings = wasGrp
    ? ss.stations.filter(s=>s.group_id===wasGrp).sort((a,b)=>(a.order||0)-(b.order||0))
    : ss.stations.filter(s=>!s.group_id).sort((a,b)=>(a.order||0)-(b.order||0));
  ss.selStId = siblings[0]?.id||null;
  markDirty();
}

function renameStation() {
  if (!_stationState) return;
  if (!_stationState.selStId) { showToast("소분류를 목록에서 먼저 선택하세요"); return; }
  const st = _stationState.stations.find(s=>s.id===_stationState.selStId);
  if (!st) { showToast("소분류를 목록에서 먼저 선택하세요"); return; }
  showNameEditModal({
    title: "소분류 이름 변경",
    label: "이름",
    initialValue: st.name || "",
    onSave: (name) => { st.name = name; markDirty(); showToast("이름 변경됨 (미저장)"); }
  });
}

function moveStation(dir) {
  if (!_stationState || !_stationState.selStId) return;
  const ss = _stationState;
  const selSt = ss.stations.find(s=>s.id===ss.selStId);
  if (!selSt) return;
  // 선택된 항목이 속한 목록(그룹 내 또는 미분류)을 대상으로 재정렬
  const list = selSt.group_id
    ? ss.stations.filter(s=>s.group_id===selSt.group_id).sort((a,b)=>(a.order||0)-(b.order||0))
    : ss.stations.filter(s=>!s.group_id).sort((a,b)=>(a.order||0)-(b.order||0));
  const idx = list.findIndex(s=>s.id===ss.selStId);
  const ni = idx+dir;
  if (ni<0||ni>=list.length) return;
  const reordered = list.slice();
  [reordered[idx],reordered[ni]] = [reordered[ni],reordered[idx]];

  const allIds = [];
  ss.station_groups.forEach(g=>{
    const inG = g.id===selSt.group_id ? reordered : ss.stations.filter(s=>s.group_id===g.id).sort((a,b)=>(a.order||0)-(b.order||0));
    inG.forEach(s=>allIds.push(s.id));
  });
  const ung = !selSt.group_id ? reordered : ss.stations.filter(s=>!s.group_id).sort((a,b)=>(a.order||0)-(b.order||0));
  ung.forEach(s=>{if(!allIds.includes(s.id))allIds.push(s.id);});

  allIds.forEach((id,i)=>{const st=ss.stations.find(x=>x.id===id);if(st)st.order=i;});
  markDirty();
}

/* ═══════════════════════════════════
   Assign modal
═══════════════════════════════════ */
let _assignModal = null;

function openAssignModal(company, site, stationId, stationName) {
  _assignModal = {company, site, stationId, stationName};
  const overlay = document.createElement("div");
  overlay.className = "assign-overlay";
  overlay.id = "assign-overlay";
  overlay.innerHTML = `
    <div class="assign-modal">
      <div class="assign-modal-header">
        <div>
          <div class="assign-modal-title">로거 배정 — ${escHtml(stationName)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${escHtml(site)} / ${escHtml(company)}</div>
        </div>
        <button class="btn-secondary" onclick="closeAssignModal()">닫기</button>
      </div>
      <div class="assign-modal-body" id="assign-modal-body">
        <div class="empty-state">불러오는 중...</div>
      </div>
      <div class="assign-modal-footer">
        <button class="btn-secondary" onclick="closeAssignModal()">취소</button>
        <button class="btn-primary" onclick="submitAssign()">배정 저장</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = e => { if (e.target === overlay) closeAssignModal(); };

  fetch(`/api/site/loggers?company=${encodeURIComponent(company)}&site=${encodeURIComponent(site)}`)
    .then(r=>r.json())
    .then(d=>renderAssignBody(d.loggers, stationId))
    .catch(()=>{document.getElementById("assign-modal-body").innerHTML='<div class="empty-state" style="color:var(--red)">데이터를 불러올 수 없습니다</div>';});
}

function renderAssignBody(loggers, stationId) {
  const body = document.getElementById("assign-modal-body");
  if (!body) return;
  if (!loggers.length) { body.innerHTML='<div class="empty-state">현장에 등록된 로거가 없습니다</div>'; return; }
  const rows = loggers.map(lg=>{
    const isCurrent = lg.station_id===stationId;
    const isOther = lg.station_id && lg.station_id!==stationId;
    return `<label class="assign-logger-row">
      <input type="checkbox" value="${escAttr(lg.folder)}||${escAttr(lg.filename)}" ${isCurrent?"checked":""} ${isOther?"disabled title='다른 개소에 배정됨'":""}>
      <div style="flex:1;min-width:0">
        <div class="assign-logger-name">${escHtml(lg.filename)}</div>
        <div class="assign-logger-folder">${escHtml(lg.folder)}</div>
      </div>
      ${isCurrent?'<span class="assign-current-badge">현재 개소</span>':""}
      ${isOther?'<span style="font-size:10px;color:var(--gray)">타 개소</span>':""}
    </label>`;
  }).join("");
  body.innerHTML = `<div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">체크된 로거가 이 개소에 배정됩니다.</div>${rows}`;
}

function closeAssignModal() {
  document.getElementById("assign-overlay")?.remove();
  _assignModal = null;
}

function submitAssign() {
  if (!_assignModal) return;
  const {company,site,stationId} = _assignModal;
  const checks = document.querySelectorAll("#assign-modal-body input[type='checkbox']:checked:not(:disabled)");
  const loggers = Array.from(checks).map(cb=>{const[folder,filename]=cb.value.split("||");return{folder,filename};});
  fetch("/api/station/assign",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({company,site,station_id:stationId,loggers})})
  .then(r=>r.json()).then(d=>{
    if (!d.ok){alert("저장 실패");return;}
    closeAssignModal();
    if (_stationState) {
      loggers.forEach(lg=>{const l=_stationState.loggers.find(x=>x.folder===lg.folder&&x.filename===lg.filename);if(l)l.station_id=stationId;});
      _stationState.loggers.forEach(l=>{
        if(l.station_id===stationId && !loggers.find(x=>x.folder===l.folder&&x.filename===l.filename)) l.station_id="";
      });
      drawStationPanel();
    }
    showToast("로거 배정이 저장되었습니다");
  }).catch(()=>alert("네트워크 오류"));
}

   Manager page

function renderProgramTypesEditor() {
  const host = document.getElementById("prog-types-editor");
  if (!host) return;
  const src = Array.isArray(_programTypes) && _programTypes.length ? _programTypes : ["AMS 휴먼프로그램", "새길 계측 프로그램"];
  const rows = src.map((p) => `
    <div class="prog-type-row" style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input class="edit-input prog-type-input" type="text" value="${escAttr(p)}" placeholder="프로그램 종류명" style="flex:1;min-width:0">
      <button type="button" class="btn-icon danger" onclick="removeProgTypeRow(this)" title="삭제">✕</button>
    </div>
  `).join("");
  host.innerHTML = `
    <p style="font-size:12px;color:var(--text-muted);margin:0 0 10px;line-height:1.45">현장 정보 탭의 「사용 프로그램」 목록입니다. 저장 즉시 목록이 갱신되며, 현장 상세를 연 상태에서는 자동 새로고침 시 반영됩니다(해당 현장을 편집 중이면 취소 후 다시 편집하세요).</p>
    <div id="prog-type-rows">${rows}</div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button type="button" class="btn-secondary" onclick="addProgTypeRow()">+ 항목 추가</button>
      <button type="button" class="btn-primary" onclick="saveProgramTypes()">목록 저장</button>
    </div>
  `;
}

function addProgTypeRow() {
  const wrap = document.getElementById("prog-type-rows");
  if (!wrap) return;
  const div = document.createElement("div");
  div.className = "prog-type-row";
  div.style.cssText = "display:flex;gap:8px;margin-bottom:8px;align-items:center";
  div.innerHTML = `<input class="edit-input prog-type-input" type="text" value="" placeholder="프로그램 종류명" style="flex:1;min-width:0">
      <button type="button" class="btn-icon danger" onclick="removeProgTypeRow(this)" title="삭제">✕</button>`;
  wrap.appendChild(div);
  div.querySelector(".prog-type-input")?.focus();
}

function removeProgTypeRow(btn) {
  const wrap = document.getElementById("prog-type-rows");
  if (!wrap || wrap.children.length <= 1) {
    alert("최소 하나의 항목이 필요합니다.");
    return;
  }
  btn.closest(".prog-type-row")?.remove();
}

function saveProgramTypes() {
  const inputs = document.querySelectorAll("#prog-type-rows .prog-type-input");
  const programs = [];
  const seen = new Set();
  inputs.forEach((inp) => {
    const s = (inp.value || "").trim();
    if (s && !seen.has(s)) {
      seen.add(s);
      programs.push(s);
    }
  });
  if (!programs.length) {
    alert("최소 하나의 프로그램명을 입력하세요.");
    return;
  }
  fetch("/api/settings/program_types", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ programs }),
  })
    .then((r) => r.json())
    .then((d) => {
      if (!d.ok) {
        alert(d.error || "저장 실패");
        return;
      }
      _programTypes = d.programs || programs;
      renderProgramTypesEditor();
      showToast("프로그램 종류가 저장되었습니다");
    })
    .catch(() => alert("네트워크 오류"));
}

function stLoadPage() {
  if (_treeData) { stBuild(Array.isArray(_treeData)?_treeData:(_treeData.tree||[])); return; }
  fetch("/api/tree").then(r=>r.json()).then(d=>{ _treeData=d; stBuild(d.tree||[]); }).catch(()=>{document.getElementById("st-list").innerHTML='<div class="empty-state">데이터 로드 실패</div>';});
}

function stBuild(tree) {
  _stAllSites = [];
  tree.forEach(comp=>{
    const compMgrs=comp.managers||[];
    (comp.sites||[]).forEach(s=>{
      const files=[];
      (s.folders||[]).forEach(fo=>(fo.files||[]).forEach(f=>files.push({...f,folder:fo.folder})));
      const stats={total:files.length,normal:0,delayed:0,unconverted:0,ghost:0};
      files.forEach(f=>{
        if(f.status==="정상")stats.normal++;else if(f.status==="지연")stats.delayed++;else if(f.status==="Ghost")stats.ghost++;else stats.unconverted++;
      });
      const mid=String(s.assigned_manager_id||"").trim();
      const mgrRow=mid?compMgrs.find(m=>String(m.id||"")===mid):null;
      const assigned_manager_title=mgrRow?(String(mgrRow.title||"").trim()):"";
      _stAllSites.push({company:comp.company,...s,files,stats,assigned_manager_title});
    });
  });
  const tabBar=document.getElementById("st-company-tabs");
  tabBar.innerHTML="";
  const companies=[...new Set(_stAllSites.map(s=>s.company))];
  const mkTab=(key,label)=>{
    const btn=document.createElement("button");
    btn.className="filter-tab"+(key===_stCompany?" active":"");
    btn.textContent=label;
    btn.onclick=()=>{_stCompany=key;tabBar.querySelectorAll(".filter-tab").forEach(b=>b.classList.remove("active"));btn.classList.add("active");stFilter();};
    tabBar.appendChild(btn);
  };
  mkTab("__all__","전체");
  companies.forEach(c=>mkTab(c,c));
  stFilter();
}

function stSortSitesInPlace(arr) {
  return [...arr].sort((a,b)=>{
    let va,vb;
    if(_stSortKey==="site"){va=a.site;vb=b.site;}
    else if(_stSortKey==="company"){va=a.company;vb=b.company;}
    else if(_stSortKey==="mgr"){va=a.assigned_manager_name||"";vb=b.assigned_manager_name||"";}
    else if(_stSortKey==="total"){return((b.stats.total)-(a.stats.total))*_stSortDir;}
    else if(_stSortKey==="issue"){return((b.stats.delayed+b.stats.unconverted)-(a.stats.delayed+a.stats.unconverted))*_stSortDir;}
    else{va=a.site;vb=b.site;}
    return va<vb?-_stSortDir:va>vb?_stSortDir:0;
  });
}

function stFilter() {
  const q=(document.getElementById("st-search")?.value||"").trim().toLowerCase();
  let list=_stAllSites;
  if(_stCompany!=="__all__")list=list.filter(s=>s.company===_stCompany);
  if(_stChipIssue)list=list.filter(s=>s.stats.delayed>0||s.stats.unconverted>0);
  if(_stChipMemo)list=list.filter(s=>String(s.memo||"").trim().length>0);
  if(q)list=list.filter(s=>s.site.toLowerCase().includes(q)||s.company.toLowerCase().includes(q)||String(s.memo||"").toLowerCase().includes(q)||String(s.assigned_manager_name||"").toLowerCase().includes(q));
  _stFilteredList=list;
  const lbl=document.getElementById("st-count-label");
  if(lbl)lbl.textContent=`${list.length}개 현장`;
  const el=document.getElementById("st-list");
  if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty-state">조건에 맞는 현장이 없습니다</div>';return;}
  const byCo=new Map();
  list.forEach(s=>{if(!byCo.has(s.company))byCo.set(s.company,[]);byCo.get(s.company).push(s);});
  const companies=[...byCo.keys()].sort((a,b)=>a.localeCompare(b,"ko"));
  el.innerHTML=companies.map(co=>{
    const sites=stSortSitesInPlace(byCo.get(co));
    return`<section class="report-co-block"><div class="report-co-banner"><span class="report-co-name">${escHtml(co)}</span><span class="report-co-meta">${sites.length}개 현장</span></div>${stSitesTableHtml(sites)}</section>`;
  }).join("");
}

function stSortBy(key) {
  if(_stSortKey===key)_stSortDir=-_stSortDir;else{_stSortKey=key;_stSortDir=1;}
  stFilter();
}

function stToggleChip(type) {
  if(type==="issue"){_stChipIssue=!_stChipIssue;document.getElementById("st-chip-issue")?.classList.toggle("active",_stChipIssue);}
  else{_stChipMemo=!_stChipMemo;document.getElementById("st-chip-memo")?.classList.toggle("active",_stChipMemo);}
  stFilter();
}

/** 업체 구역 안 테이블 (현장명만 — 업체는 배너에 표시) */
function stSitesTableHtml(sites) {
  const sortIcon=key=>{if(_stSortKey!==key)return'<span class="st-sort-icon">⇅</span>';return'<span class="st-sort-icon">'+(_stSortDir===1?'▲':'▼')+'</span>';};
  const thCls=key=>`${_stSortKey===key?'sort-active':''}`;
  const rows=sites.map(s=>{
    const sid=(s.company+"__"+s.site).replace(/[^a-zA-Z0-9가-힣_]/g,"_");
    const{stats}=s;
    const memo=String(s.memo||"").trim();
    const mgr=String(s.assigned_manager_name||"").trim();
    const mgrSub=String(s.assigned_manager_title||"").trim();
    const qmgr=String(s.assigned_qm_manager_name||"").trim();
    const prog=String(s.site_program||"").trim();
    const hasIssue=stats.unconverted>0?"row-error":stats.delayed>0?"row-warn":"";
    const badgeParts=[];
    if(stats.total>0){
      if(stats.normal)badgeParts.push(`<span class="stt-badge ok">${stats.normal} 정상</span>`);
      if(stats.delayed)badgeParts.push(`<span class="stt-badge warn">${stats.delayed} 지연</span>`);
      if(stats.unconverted)badgeParts.push(`<span class="stt-badge bad">${stats.unconverted} 미변환</span>`);
      if(stats.ghost)badgeParts.push(`<span class="stt-badge ghost">${stats.ghost} Ghost</span>`);
    }
    const loggerBadges=stats.total===0?"-":(badgeParts.length?badgeParts.join(""):"-");
    const mgrInner=mgr
      ?`<div class="stt-mgr">${escHtml(mgr)}</div>${mgrSub?`<div class="stt-mgr-sub">${escHtml(mgrSub)}</div>`:""}${qmgr?`<div class="stt-qm">QM ${escHtml(qmgr)}</div>`:""}`
      :'<span class="stt-mgr-unset">미배정</span>';
    const mgrHtml=`<div class="stt-mgr-cell">${mgrInner}</div>`;
    const progHtml=prog?`<span class="stt-prog">${escHtml(prog)}</span>`:'<span class="stt-prog-empty">-</span>';
    const memoView=memo?`<span class="stt-memo-view has-memo" title="${escAttr(memo)}" onclick="sttMemoEdit('${sid}',this)">${escHtml(memo.length>40?memo.slice(0,40)+'…':memo)}</span>`:`<span class="stt-memo-view" onclick="sttMemoEdit('${sid}',this)"><span class="stt-memo-empty">클릭하여 입력</span></span>`;
    const memoEdit=`<div class="stt-memo-edit-wrap" id="sttme-${sid}"><textarea class="stt-memo-ta" id="sttmeta-${sid}" rows="2">${escHtml(memo)}</textarea><div class="stt-memo-actions"><span class="stt-memo-saved" id="sttmsaved-${sid}">저장됨</span><button class="stt-memo-cancel" onclick="sttMemoCancel('${sid}')">취소</button><button class="stt-memo-save" onclick="sttMemoSave('${sid}','${escAttr(s.company)}','${escAttr(s.site)}')">저장</button></div></div>`;
    return `<tr class="${hasIssue}" id="sttrow-${sid}"><td data-label="현장명"><div class="stt-site-cell"><div class="stt-site-name">${escHtml(s.site)}</div></div></td><td data-label="담당자">${mgrHtml}</td><td data-label="로거 현황"><div class="stt-logger-cell">${loggerBadges}</div></td><td data-label="프로그램">${progHtml}</td><td data-label="특이사항">${memoView}${memoEdit}</td></tr>`;
  }).join("");
  const sortBtn=(key,label)=>{
    const on=_stSortKey===key;
    const arrow=on?(_stSortDir===1?" ▲":" ▼"):"";
    return`<button type="button" class="report-mobile-sort-btn${on?" active":""}" onclick="stSortBy('${key}')">${label}${arrow}</button>`;
  };
  const mobileSort=
    `<div class="report-mobile-sort" aria-label="표 정렬">`+
    `<span class="report-mobile-sort-lbl">정렬</span>`+
    sortBtn("site","현장명")+sortBtn("mgr","담당자")+sortBtn("issue","이슈")+
    `</div>`;
  return `<div class="st-tbl-wrap">${mobileSort}<table class="report-table"><thead><tr><th class="${thCls('site')}" onclick="stSortBy('site')">현장명${sortIcon('site')}</th><th class="${thCls('mgr')}" onclick="stSortBy('mgr')">담당자${sortIcon('mgr')}</th><th class="${thCls('issue')}" onclick="stSortBy('issue')">로거 현황${sortIcon('issue')}</th><th>프로그램</th><th>특이사항</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function sttMemoSave(sid, company, site) {
  const ta=document.getElementById("sttmeta-"+sid);
  const msg=document.getElementById("sttmsaved-"+sid);
  if(!ta)return;
  const memo=ta.value;
  fetch("/api/site/settings",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({company,site,settings:{memo}})})
  .then(r=>r.json()).then(d=>{
    if(!d.ok){alert("저장 실패");return;}
    const s=_stAllSites.find(x=>x.company===company&&x.site===site);
    if(s)s.memo=memo;
    const row=document.getElementById("sttrow-"+sid);
    if(row){
      const viewSpan=row.querySelector(".stt-memo-view");
      if(viewSpan){viewSpan.classList.toggle("has-memo",!!memo.trim());viewSpan.title=memo;viewSpan.innerHTML=memo.trim()?escHtml(memo.length>40?memo.slice(0,40)+'…':memo):'<span class="stt-memo-empty">클릭하여 입력</span>';viewSpan.style.display="";}
      const wrap=document.getElementById("sttme-"+sid);
      if(wrap)wrap.classList.remove("show");
    }
    if(msg){msg.classList.add("show");setTimeout(()=>msg.classList.remove("show"),2000);}
  }).catch(()=>alert("네트워크 오류"));
}

function _stDispositionFilename(resp, fallback) {
  try {
    const d = (resp.headers && resp.headers.get("Content-Disposition")) || "";
    const m = /filename\*=UTF-8''([^;]+)|filename="([^"]+)"|filename=([^;\s]+)/i.exec(d);
    if (!m) return fallback;
    let raw = (m[1] || m[2] || m[3] || "").trim().replace(/^"+|"+$/g, "");
    if (m[1]) raw = decodeURIComponent(raw);
    return raw || fallback;
  } catch (_e) {
    return fallback;
  }
}

/* ═══════════════════════════════════
   Report — 서버 내보내기 (.xlsx, openpyxl 없으면 자동 CSV)
═══════════════════════════════════ */
function stBuildReportExportPayload() {
  const list = _stFilteredList || [];
  if (!list.length) return null;
  const byCo = new Map();
  list.forEach((s) => {
    if (!byCo.has(s.company)) byCo.set(s.company, []);
    byCo.get(s.company).push(s);
  });
  const companies = [...byCo.keys()].sort((a, b) => a.localeCompare(b, "ko"));
  const groups = companies.map((co) => {
    const raw = byCo.get(co) || [];
    const sites = stSortSitesInPlace(raw).map((s) => ({
      site: s.site,
      manager: s.assigned_manager_name || "",
      manager_title: s.assigned_manager_title || "",
      qm: s.assigned_qm_manager_name || "",
      program: s.site_program || "",
      memo: s.memo || "",
      stats: s.stats || {},
    }));
    return { company: co, site_count: sites.length, sites };
  });
  const filterScope = _stCompany === "__all__" ? "전체" : _stCompany;
  const chips = [];
  if (_stChipIssue) chips.push("이슈만");
  if (_stChipMemo) chips.push("메모 있음");
  const q = (document.getElementById("st-search")?.value || "").trim();
  const chipStr = chips.length ? " · " + chips.join(", ") : "";
  const qStr = q ? " · 검색: " + q : "";
  return {
    title: "QM 통합관제 시스템 — 현장 현황",
    subtitle: new Date().toLocaleString("ko-KR") + " · 표시: " + filterScope + chipStr + qStr,
    groups,
  };
}

function exportReportXlsx() {
  const src = document.getElementById("st-list");
  if (!src || !src.innerHTML.trim()) {
    alert("내보낼 데이터가 없습니다.");
    return;
  }
  if (src.querySelector(".empty-state")) {
    alert("\uC870\uAC74\uC5D0 \uB9DE\uB294 \uD604\uC7A5\uC774 \uC5C6\uC2B5\uB2C8\uB2E4. \uD544\uD130\uB97C \uD480\uACE0 \uB2E4\uC2DC \uC2DC\uB3C4\uD558\uC138\uC694.");
    return;
  }
  const payload = stBuildReportExportPayload();
  if (!payload) {
    alert("내보낼 데이터가 없습니다.");
    return;
  }
  const overlay = document.createElement("div");
  overlay.id = "xlsx-export-overlay";
  overlay.style.cssText =
    "position:fixed;inset:0;z-index:2147483646;display:flex;align-items:center;justify-content:center;" +
    "background:rgba(15,23,42,.4);font:600 15px 'Segoe UI',system-ui,sans-serif;color:#fff;pointer-events:all";
  overlay.textContent = "\ud30c\uc77c \uc900\ube44 \uc911\u2026";
  document.body.appendChild(overlay);
  const today = new Date();
  const dateStr =
    today.getFullYear() +
    String(today.getMonth() + 1).padStart(2, "0") +
    String(today.getDate()).padStart(2, "0");
  const fnameBase = "\ud604\uc7a5\ud604\ud669_" + (_stCompany === "__all__" ? "\uc804\uccb4" : _stCompany) + "_" + dateStr;
  fetch("/api/report/export-xlsx", {
    method: "POST",
    credentials: "same-origin",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  })
    .then(async (r) => {
      const ct = (r.headers.get("Content-Type") || "").toLowerCase();
      if (!r.ok) {
        let msg = "\ub0b4\ubcf4\ub0b4\uae30\uc5d0 \uc2e4\ud328\ud588\uc2b5\ub2c8\ub2e4.";
        try {
          if (ct.includes("json")) {
            const j = await r.json();
            if (j && j.error) msg = j.error;
          }
        } catch (_e) {}
        throw new Error(msg);
      }
      const ext =
        ct.includes("spreadsheet") || ct.includes("officedocument") || ct.includes("excel")
          ? ".xlsx"
          : ".csv";
      const fallback = fnameBase + ext;
      const fnameDl = _stDispositionFilename(r, fallback);
      const blob = await r.blob();
      return { blob, fname: fnameDl };
    })
    .then(({ blob, fname }) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fname;
      a.click();
      URL.revokeObjectURL(url);
    })
    .catch((e) => alert(e.message || "\ub0b4\ubcf4\ub0b4\uae30\uc5d0 \uc2e4\ud328\ud588\uc2b5\ub2c8\ub2e4."))
    .finally(() => overlay.remove());
}

/* ═══════════════════════════════════
   PDF export (화면과 동일 구성 · html2pdf)
═══════════════════════════════════ */
function exportPdf() {
  if (typeof html2pdf === "undefined") {
    alert(
      "PDF 라이브러리가 로드되지 않았습니다. 새로 고침 후 재시도하거나, 리포트의 「인쇄/PDF 저장」으로 브라우저 출력에서 PDF를 선택하세요. (/static/vendor/html2pdf.bundle.min.js)"
    );
    return;
  }
  const src = document.getElementById("st-list");
  if (!src || !src.innerHTML.trim()) {
    alert("내보낼 데이터가 없습니다.");
    return;
  }
  if (src.querySelector(".empty-state")) {
    alert("\uC870\uAC74\uC5D0 \uB9DE\uB294 \uD604\uC7A5\uC774 \uC5C6\uC2B5\uB2C8\uB2E4. \uD544\uD130\uB97C \uD480\uACE0 \uB2E4\uC2DC \uC2DC\uB3C4\uD558\uC138\uC694.");
    return;
  }
  const wrap = document.createElement("div");
  wrap.className = "report-pdf-root";
  wrap.setAttribute("aria-hidden", "true");
  const hdr = document.createElement("div");
  hdr.className = "report-pdf-header";
  hdr.innerHTML =
    "<h1>현장 현황 리포트</h1><p>" + escHtml(new Date().toLocaleString("ko-KR")) + "</p>";
  wrap.appendChild(hdr);
  const block = src.cloneNode(true);
  block.removeAttribute("id");
  block.querySelectorAll(".report-mobile-sort").forEach((el) => el.remove());
  block.querySelectorAll(".st-sort-icon").forEach((el) => el.remove());
  block.querySelectorAll(".stt-memo-edit-wrap").forEach((el) => el.remove());
  block.querySelectorAll("[onclick]").forEach((el) => el.removeAttribute("onclick"));
  block.querySelectorAll(".stt-memo-empty").forEach((el) => {
    if ((el.textContent || "").trim() === "클릭하여 입력") el.textContent = "-";
  });
  block.querySelectorAll(".stt-memo-view").forEach((el) => {
    el.removeAttribute("onclick");
    el.style.cursor = "default";
    const full = (el.getAttribute("title") || "").trim();
    if (full) {
      el.textContent = full;
      el.style.whiteSpace = "pre-wrap";
      el.style.maxWidth = "100%";
      el.style.overflow = "visible";
    }
  });
  wrap.appendChild(block);
  const overlay = document.createElement("div");
  overlay.id = "pdf-export-overlay";
  overlay.style.cssText =
    "position:fixed;inset:0;z-index:2147483646;display:flex;align-items:center;justify-content:center;" +
    "background:rgba(15,23,42,.4);font:600 15px 'Segoe UI',system-ui,sans-serif;color:#fff;pointer-events:all";
  overlay.textContent = "PDF \uC0DD\uC131 \uC911\u2026";
  document.body.appendChild(overlay);
  Object.assign(wrap.style, {
    position: "fixed",
    left: "0",
    top: "0",
    width: "1024px",
    maxWidth: "100vw",
    overflow: "visible",
    visibility: "visible",
    opacity: "1",
    boxSizing: "border-box",
    padding: "14px 18px",
    background: "#fff",
    fontFamily: "'Segoe UI',system-ui,sans-serif",
    color: "#0f172a",
    fontSize: "11px",
    zIndex: "2147483647",
    pointerEvents: "none",
  });
  document.body.appendChild(wrap);
  const today = new Date();
  const dateStr =
    today.getFullYear() +
    String(today.getMonth() + 1).padStart(2, "0") +
    String(today.getDate()).padStart(2, "0");
  const fname = `현장현황_${_stCompany === "__all__" ? "전체" : _stCompany}_${dateStr}.pdf`;
  const cleanup = () => {
    wrap.remove();
    overlay.remove();
  };
  const runPdf = () => {
    void wrap.offsetHeight;
    const rect = wrap.getBoundingClientRect();
    const scrollH = Math.max(Math.ceil(wrap.scrollHeight), Math.ceil(rect.height));
    const scrollW = Math.max(Math.ceil(wrap.scrollWidth), Math.ceil(rect.width));
    const canvasH = Math.max(800, scrollH + 80);
    const maxCanvasSide = 14000;
    const scale = Math.min(2, Math.max(1, Math.floor(maxCanvasSide / Math.max(1, Math.max(scrollW, scrollH)))));
    const fontsP =
      document.fonts && document.fonts.ready
        ? Promise.race([document.fonts.ready, new Promise((r) => setTimeout(r, 2500))])
        : Promise.resolve();
    fontsP.catch(() => {}).then(() => {
      html2pdf()
        .set({
          margin: [10, 10, 10, 10],
          filename: fname,
          image: { type: "png", quality: 1 },
          html2canvas: {
            scale,
            useCORS: true,
            allowTaint: true,
            foreignObjectRendering: false,
            logging: false,
            backgroundColor: "#ffffff",
            scrollX: 0,
            scrollY: 0,
            windowWidth: Math.max(1024, scrollW),
            windowHeight: canvasH,
            onclone(doc) {
              const root = doc.querySelector(".report-pdf-root");
              if (root) {
                root.style.opacity = "1";
                root.style.visibility = "visible";
              }
              if (doc.getElementById("report-h2canvas-bg-patch")) return;
              const st = doc.createElement("style");
              st.id = "report-h2canvas-bg-patch";
              st.textContent =
                ".report-pdf-root .report-co-banner{background:#2563eb!important;color:#fff!important;}" +
                ".report-pdf-root .report-co-name,.report-pdf-root .report-co-meta{color:#fff!important;}" +
                ".report-pdf-root .report-table thead th{background:#e2e8f0!important;color:#1d4ed8!important;border-bottom:1px solid #cbd5e1!important;}" +
                ".report-pdf-root .report-table tbody tr{background:#fff!important;}" +
                ".report-pdf-root .report-table tbody tr:nth-child(even){background:#f8fafc!important;}" +
                ".report-pdf-root .report-table tbody tr.row-warn{background:#fffbeb!important;}" +
                ".report-pdf-root .report-table tbody tr.row-error{background:#fef2f2!important;}" +
                ".report-pdf-root .stt-badge.ok{background:#dcfce7!important;color:#15803d!important;}" +
                ".report-pdf-root .stt-badge.warn{background:#fef9c3!important;color:#a16207!important;}" +
                ".report-pdf-root .stt-badge.bad{background:#fee2e2!important;color:#b91c1c!important;}" +
                ".report-pdf-root .stt-badge.ghost{background:#f1f5f9!important;color:#64748b!important;}";
              (doc.head || doc.documentElement).appendChild(st);
            },
          },
          jsPDF: { unit: "mm", format: "a4", orientation: "landscape" },
          pagebreak: { mode: ["avoid-all", "css", "legacy"] },
        })
        .from(wrap)
        .save()
        .then(cleanup)
        .catch(() => {
          cleanup();
          alert("PDF 생성에 실패했습니다.");
        });
    });
  };
  wrap.getBoundingClientRect();
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      setTimeout(runPdf, 120);
    });
  });
}

/* ═══════════════════════════════════
   Refresh all
═══════════════════════════════════ */
function refreshAll() {
  const lu = document.getElementById("last-updated");
  if (lu) lu.textContent = "마지막 갱신: "+new Date().toLocaleTimeString("ko-KR");
  return Promise.all([
    fetch("/api/tree").then(r=>r.json()),
    fetch("/api/companies").then(r=>r.json()).catch(()=>({companies:[],qm_managers:[]})),
  ]).then(([data,cd])=>{
    _treeData=data;
    if(cd&&cd.companies)_companiesData=cd.companies;
    if(cd&&cd.qm_managers)_qmManagers=cd.qm_managers||[];
    if(cd&&Array.isArray(cd.program_types)&&cd.program_types.length)_programTypes=cd.program_types.slice();
    if(_currentPage==="dashboard"){
      renderDashboard(data);
      if(_detailSite){
        const tree=data.tree||data;
        let foundDetail = false;
        for(const c of tree){
          const found=(c.sites||[]).find(s=>s.site===_detailSite.site&&c.company===_detailSite.company);
          if(found){
            _detailSite={...found,company:c.company,managers:c.managers||[]};
            foundDetail=true;
            _refreshDetailInfoIfIdle();
            break;
          }
        }
        if(!foundDetail){ _exitSiteDetailUI(); }
      }
    }else if(_currentPage==="manager"){
      renderManagerPage();
    }else if(_currentPage==="report"){
      stBuild(data.tree||[]);
    }else if(_currentPage==="qmremote"){
      qmRemoteRefresh();
    }
  }).catch(()=>{}).finally(function () {
    if (_cpBootScrollPending) {
      _cpBootScrollPending = false;
      cpRestoreDeferred();
    }
    requestAnimationFrame(function () {
      syncMobileHeaderOffset();
    });
  });
}

function setAutoRefresh() {
  clearInterval(_refreshTimer);
  const sec=parseInt(document.getElementById("refresh-interval").value);
  if(sec>0)_refreshTimer=setInterval(refreshAll,sec*1000);
}

document.getElementById("refresh-interval").onchange=setAutoRefresh;

function closeMobileMainMenu() {
  document.body.classList.remove("mobile-menu-open");
  var b = document.getElementById("btn-mobile-menu");
  if (b) b.setAttribute("aria-expanded", "false");
}
function syncMobileHeaderOffset() {
  if (!window.matchMedia || !matchMedia("(max-width:640px)").matches) {
    document.documentElement.style.removeProperty("--mobile-header-h");
    return;
  }
  var hdr = document.querySelector("header");
  var h = hdr ? hdr.getBoundingClientRect().height : 72;
  document.documentElement.style.setProperty("--mobile-header-h", Math.ceil(h) + "px");
}

function setupMobileMainMenu() {
  var btn = document.getElementById("btn-mobile-menu");
  var bd = document.getElementById("mobile-menu-backdrop");
  if (btn) {
    btn.addEventListener("click", function () {
      document.body.classList.toggle("mobile-menu-open");
      btn.setAttribute(
        "aria-expanded",
        document.body.classList.contains("mobile-menu-open") ? "true" : "false"
      );
    });
  }
  if (bd) bd.addEventListener("click", closeMobileMainMenu);
  document.querySelectorAll(".nav-item").forEach(function (n) {
    n.addEventListener("click", closeMobileMainMenu);
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeMobileMainMenu();
  });
}
setupMobileMainMenu();
syncMobileHeaderOffset();
window.addEventListener("resize", function () {
  syncMobileHeaderOffset();
});

cpSetupScrollPersistence();
switchPage(_currentPage);
refreshAll();
setAutoRefresh();
requestAnimationFrame(function () {
  syncMobileHeaderOffset();
  requestAnimationFrame(syncMobileHeaderOffset);
});
