{% extends "base.html" %}
{% block title %}접근 거부{% endblock %}
{% block body_class %}page-login{% endblock %}
{% block body %}
<div class="login-shell">
  <div class="login-card">
    <h1 style="font-size:1.2rem;margin-bottom:12px">403 — 권한이 없습니다</h1>
    <p class="login-sub">이 페이지나 작업은 현재 로그인(역할·할당 현장)으로는 사용할 수 없습니다.</p>
    <p style="margin-top:16px">
      <a class="btn-ghost" href="{{ url_for('organization_list') }}">업체 리스트</a>
      {% if username %}
      <a class="btn-ghost" href="{{ url_for('logout') }}" style="margin-left:8px">로그아웃</a>
      {% endif %}
    </p>
  </div>
</div>
{% endblock %}
