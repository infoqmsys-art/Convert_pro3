{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-wrap">
      {% for category, msg in messages %}
        <p class="flash {% if category == 'error' %}flash-error{% else %}flash-ok{% endif %}">{{ msg }}</p>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
